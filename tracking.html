<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>出貨追蹤</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📦 出貨追蹤</h1>
</header>

<div class="tracking-container">

    <h2 id="order-id">
        訂單編號
    </h2>

    <div class="progress-box">

        <div class="step">
            <div class="circle">1</div>
            <p>訂單成立</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <div class="circle">2</div>
            <p>備貨中</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <div class="circle">3</div>
            <p>已出貨</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <div class="circle">4</div>
            <p>配送中</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <div class="circle">5</div>
            <p>已送達</p>
        </div>

    </div>

    <h2 id="status-text"></h2>

</div>

<script src="tracking.js"></script>

</body>
</html>
