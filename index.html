<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>CS Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <div class="hero-overlay">

        <h1>CS Store</h1>

        <p>K-POP 周邊商品專賣店 💕</p>

        <div class="hero-buttons">

            <button onclick="location.href='shop.html'">
                🛒 進入商店
            </button>

            <button onclick="location.href='tracking-search.html'">
                📦 訂單查詢
            </button>

        </div>

    </div>

</section>

<section class="news">

    <h2>📢 最新公告</h2>

    <div class="news-card">

        <h3>夏季限定活動</h3>

        <p>
            全館滿 1500 元免運費
        </p>

    </div>

    <div class="news-card">

        <h3>新商品上架</h3>

        <p>
            aespa、IVE 最新周邊到貨
        </p>

    </div>

</section>

<section class="idol-slider">

    <h2>✨ 熱門藝人</h2>

    <div class="slider">

        <img id="slider-img"
        src="https://picsum.photos/1000/500?1">

    </div>

</section>

<footer>

    © 2026 CS Store

</footer>

<script>

const images = [

"https://picsum.photos/1000/500?1",

"https://picsum.photos/1000/500?2",

"https://picsum.photos/1000/500?3",

"https://picsum.photos/1000/500?4"

];

let current = 0;

setInterval(()=>{

current++;

if(current >= images.length){

current = 0;

}

document.getElementById(
"slider-img"
).src = images[current];

},3000);

</script>

</body>
</html>
